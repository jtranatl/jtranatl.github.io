<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Repair Shop Bin Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f0efeb;
    --border: rgba(0,0,0,0.12);
    --border-med: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text2: #5a5a57;
    --text3: #9a9a96;
    --teal-bg: #E1F5EE;
    --teal-border: #5DCAA5;
    --teal-text: #085041;
    --teal-mid: #1D9E75;
    --teal-dark: #0F6E56;
    --amber: #BA7517;
    --red: #A32D2D;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --surface: #262624;
      --surface2: #303030;
      --border: rgba(255,255,255,0.1);
      --border-med: rgba(255,255,255,0.2);
      --text: #f0efe8;
      --text2: #a8a8a4;
      --text3: #686864;
      --teal-bg: #04342C;
      --teal-border: #1D9E75;
      --teal-text: #9FE1CB;
      --teal-dark: #5DCAA5;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; flex: 1; }
  header .sub { font-size: 12px; color: var(--text3); font-weight: 400; margin-left: 4px; }

  .stats { display: flex; gap: 8px; }
  .stat {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }
  .stat b { color: var(--text); font-weight: 600; }

  .toolbar {
    padding: 14px 24px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .main { padding: 14px 24px 40px; }

  .grid {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(5, 1fr);
  }

  .bin {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    min-height: 150px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    transition: border-color 0.12s, background 0.12s;
    position: relative;
  }
  .bin:hover { border-color: var(--border-med); }
  .bin.occupied {
    background: var(--teal-bg);
    border-color: var(--teal-border);
  }
  .bin.warn { background: #FAEEDA; border-color: #EF9F27; }
  .bin.alert { background: #FCEBEB; border-color: #F09595; }

  .bin-header { display: flex; align-items: flex-start; justify-content: space-between; }

  .bin-id {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text3);
    line-height: 1;
  }
  .bin.occupied .bin-id { color: var(--teal-dark); }
  .bin.warn .bin-id { color: #854F0B; }
  .bin.alert .bin-id { color: #791F1F; }

  .bin-rename-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 11px;
    padding: 0;
    opacity: 0;
    transition: opacity 0.1s;
    line-height: 1;
  }
  .bin:hover .bin-rename-btn { opacity: 1; }

  .bin-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .bin.occupied .bin-name { color: var(--teal-text); }
  .bin.warn .bin-name { color: #412402; }
  .bin.alert .bin-name { color: #501313; }

  .bin-device {
    font-size: 11px;
    color: var(--text2);
    font-weight: 500;
  }
  .bin.occupied .bin-device { color: var(--teal-dark); }

  .bin-link {
    font-size: 11px;
    color: var(--teal-mid);
    text-decoration: underline;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }

  .bin-accessories {
    font-size: 11px;
    color: var(--text3);
    font-style: italic;
    line-height: 1.3;
  }
  .bin.occupied .bin-accessories { color: var(--teal-dark); opacity: 0.8; }

  .bin-footer {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .days-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--teal-mid);
    color: #fff;
  }
  .days-badge.warn { background: var(--amber); }
  .days-badge.alert { background: var(--red); }

  .pips { display: flex; gap: 2px; flex-wrap: wrap; max-width: 80px; }
  .pip { width: 5px; height: 5px; border-radius: 1px; background: var(--teal-mid); }
  .pip.warn { background: var(--amber); }
  .pip.alert { background: var(--red); }

  .bin-empty { font-size: 12px; color: var(--text3); margin-top: auto; }

  /* Buttons */
  button {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-med);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s;
    white-space: nowrap;
  }
  button:hover { background: var(--surface2); }
  button:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--teal-mid);
    color: #fff;
    border-color: var(--teal-dark);
  }
  .btn-primary:hover { background: var(--teal-dark); }

  .btn-danger {
    background: #FCEBEB;
    color: #791F1F;
    border-color: #F09595;
  }
  .btn-danger:hover { background: #F7C1C1; }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px solid var(--border-med);
    padding: 22px;
    width: 400px;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text3); padding: 0; }
  .modal-close:hover { color: var(--text); background: none; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.03em; text-transform: uppercase; }
  .field input, .field select, .field textarea {
    font-family: inherit;
    font-size: 14px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-med);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.12s;
    width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--teal-mid); }
  .field textarea { resize: vertical; min-height: 60px; }

  .modal-actions { display: flex; gap: 8px; }
  .modal-actions button { flex: 1; }

  /* Rename modal */
  .rename-modal {
    width: 300px;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text2);
    align-items: center;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px 0 4px;
  }

  .divider { border: none; border-top: 0.5px solid var(--border); }
</style>
</head>
<body>

<header>
  <h1>Repair Shop <span class="sub">Bin Tracker</span></h1>
  <div class="stats">
    <div class="stat">Occupied: <b id="stat-occ">0</b></div>
    <div class="stat">Available: <b id="stat-avail">0</b></div>
    <div class="stat">Overdue (14d+): <b id="stat-over">0</b></div>
  </div>
</header>

<div class="toolbar">
  <button onclick="addRow()">+ Add row</button>
  <button onclick="addCol()">+ Add column</button>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--teal-mid)"></div> &lt;7 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div> 7–13 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> 14+ days</div>
  </div>
</div>

<div class="main">
  <div class="grid" id="grid"></div>
</div>

<!-- Reserve / Edit Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Reserve slot</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="field">
      <label>Customer name</label>
      <input type="text" id="f-name" placeholder="e.g. Jane Smith" />
    </div>
    <div class="field">
      <label>Device type</label>
      <input type="text" id="f-device" placeholder="e.g. iPhone 14, MacBook Pro, PS5..." />
    </div>
    <div class="field">
      <label>Ticket / Link URL</label>
      <input type="text" id="f-link" placeholder="https://..." />
    </div>
    <div class="field">
      <label>Accessories</label>
      <textarea id="f-accessories" placeholder="e.g. Charger, case, AirPods, stylus..."></textarea>
    </div>
    <div class="field">
      <label>Check-in date</label>
      <input type="date" id="f-date" />
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Any additional notes..."></textarea>
    </div>

    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveSlot()" id="btn-save">Reserve</button>
      <button class="btn-danger" id="btn-clear" onclick="clearSlot()" style="display:none">Release slot</button>
    </div>
  </div>
</div>

<!-- Rename Modal -->
<div class="modal-bg" id="rename-bg">
  <div class="modal rename-modal">
    <div class="modal-header">
      <h3>Rename slot</h3>
      <button class="modal-close" onclick="closeRename()">✕</button>
    </div>
    <div class="field">
      <label>Slot label</label>
      <input type="text" id="rename-input" placeholder="e.g. A01, Shelf-3, Front-Left..." maxlength="12" />
    </div>
    <div class="modal-actions">
      <button onclick="closeRename()">Cancel</button>
      <button class="btn-primary" onclick="saveRename()">Save</button>
    </div>
  </div>
</div>

<script>
let bins = [];
let ROWS = 4, COLS = 5;
let activeBin = null;
let renameTarget = null;

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('repairBins_v3'));
    if (d && d.bins) { bins = d.bins; ROWS = d.rows || 4; COLS = d.cols || 5; return; }
  } catch {}
  resetDefault();
}

function resetDefault() {
  bins = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      bins.push(makeBin(r, c));
}

function makeBin(r, c) {
  return { id: `${r}_${c}`, row: r, col: c, label: rowChar(r) + pad(c+1), occupied: false, name:'', device:'', link:'', accessories:'', notes:'', date:'' };
}

function rowChar(r) { return String.fromCharCode(65 + r); }
function pad(n) { return String(n).padStart(2, '0'); }

function save() {
  try { localStorage.setItem('repairBins_v3', JSON.stringify({ bins, rows: ROWS, cols: COLS })); } catch {}
}

function daysAgo(d) {
  if (!d) return 0;
  return Math.max(0, Math.floor((Date.now() - new Date(d)) / 86400000));
}

function dayClass(days) {
  if (days >= 14) return 'alert';
  if (days >= 7) return 'warn';
  return '';
}

function render() {
  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
  grid.innerHTML = '';

  let occ = 0, over = 0;

  bins.forEach(b => {
    const days = b.occupied ? daysAgo(b.date) : 0;
    const dc = dayClass(days);
    if (b.occupied) { occ++; if (days >= 14) over++; }

    const div = document.createElement('div');
    div.className = 'bin' + (b.occupied ? (' occupied ' + dc) : '');
    div.onclick = () => openModal(b.id);

    if (b.occupied) {
      const pipCount = Math.min(days, 18);
      const pips = Array.from({length: pipCount}, (_,i) => {
        const cls = i < 7 ? '' : i < 14 ? ' warn' : ' alert';
        return `<div class="pip${cls}"></div>`;
      }).join('');

      div.innerHTML = `
        <div class="bin-header">
          <div class="bin-id">${esc(b.label)}</div>
          <button class="bin-rename-btn" title="Rename slot" onclick="event.stopPropagation(); openRename('${b.id}')">✎</button>
        </div>
        <div class="bin-name">${esc(b.name)}</div>
        ${b.device ? `<div class="bin-device">${esc(b.device)}</div>` : ''}
        ${b.link ? `<a class="bin-link" href="${esc(b.link)}" target="_blank" onclick="event.stopPropagation()">${linkLabel(b.link)}</a>` : ''}
        ${b.accessories ? `<div class="bin-accessories">+ ${esc(b.accessories)}</div>` : ''}
        <div class="bin-footer">
          <div class="pips">${pips}</div>
          <div class="days-badge ${dc}">${days}d</div>
        </div>
      `;
    } else {
      div.innerHTML = `
        <div class="bin-header">
          <div class="bin-id">${esc(b.label)}</div>
          <button class="bin-rename-btn" title="Rename slot" onclick="event.stopPropagation(); openRename('${b.id}')">✎</button>
        </div>
        <div class="bin-empty">Empty — click to reserve</div>
      `;
    }

    grid.appendChild(div);
  });

  document.getElementById('stat-occ').textContent = occ;
  document.getElementById('stat-avail').textContent = bins.length - occ;
  document.getElementById('stat-over').textContent = over;
  save();
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function linkLabel(url) {
  try { return new URL(url).hostname || url; } catch { return url.slice(0, 30); }
}

function openModal(id) {
  activeBin = id;
  const b = bins.find(x => x.id === id);
  document.getElementById('modal-title').textContent = b.occupied ? `Edit — ${b.label}` : `Reserve — ${b.label}`;
  document.getElementById('f-name').value = b.name || '';
  document.getElementById('f-device').value = b.device || '';
  document.getElementById('f-link').value = b.link || '';
  document.getElementById('f-accessories').value = b.accessories || '';
  document.getElementById('f-notes').value = b.notes || '';
  document.getElementById('f-date').value = b.date || new Date().toISOString().slice(0,10);
  document.getElementById('btn-save').textContent = b.occupied ? 'Update' : 'Reserve';
  document.getElementById('btn-clear').style.display = b.occupied ? '' : 'none';
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('f-name').focus();
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  activeBin = null;
}

function saveSlot() {
  const b = bins.find(x => x.id === activeBin);
  b.name = document.getElementById('f-name').value.trim() || 'Unknown';
  b.device = document.getElementById('f-device').value.trim();
  b.link = document.getElementById('f-link').value.trim();
  b.accessories = document.getElementById('f-accessories').value.trim();
  b.notes = document.getElementById('f-notes').value.trim();
  b.date = document.getElementById('f-date').value || new Date().toISOString().slice(0,10);
  b.occupied = true;
  closeModal();
  render();
}

function clearSlot() {
  const b = bins.find(x => x.id === activeBin);
  Object.assign(b, { occupied: false, name:'', device:'', link:'', accessories:'', notes:'', date:'' });
  closeModal();
  render();
}

function openRename(id) {
  renameTarget = id;
  const b = bins.find(x => x.id === id);
  document.getElementById('rename-input').value = b.label;
  document.getElementById('rename-bg').classList.add('open');
  setTimeout(() => document.getElementById('rename-input').select(), 50);
}

function closeRename() {
  document.getElementById('rename-bg').classList.remove('open');
  renameTarget = null;
}

function saveRename() {
  const val = document.getElementById('rename-input').value.trim();
  if (!val) return;
  const b = bins.find(x => x.id === renameTarget);
  if (b) b.label = val.slice(0, 12);
  closeRename();
  render();
}

function addRow() {
  const newRow = ROWS;
  for (let c = 0; c < COLS; c++) bins.push(makeBin(newRow, c));
  ROWS++;
  render();
}

function addCol() {
  const newCol = COLS;
  for (let r = 0; r < ROWS; r++) bins.push(makeBin(r, newCol));
  COLS++;
  render();
}

// Close modals on backdrop click
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('rename-bg').addEventListener('click', e => { if (e.target === e.currentTarget) closeRename(); });

// Enter key in rename
document.getElementById('rename-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveRename(); });

load();
render();
</script>
</body>
</html>
